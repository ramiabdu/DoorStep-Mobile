services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-doorstep}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-doorstep}
      POSTGRES_DB: ${POSTGRES_DB:-doorstep}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-doorstep} -d ${POSTGRES_DB:-doorstep}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-doorstep}:${POSTGRES_PASSWORD:-doorstep}@postgres:5432/${POSTGRES_DB:-doorstep}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_DOORSTEP_API_URL: ${VITE_DOORSTEP_API_URL:-http://localhost:4000}
    ports:
      - "5173:4173"
    depends_on:
      - backend

volumes:
  postgres_data:
