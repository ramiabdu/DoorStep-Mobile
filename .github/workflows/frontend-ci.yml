name: Frontend CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  frontend:
    name: Lint, typecheck, and build frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend dependencies
        run: npm install

      - name: Verify production config
        run: npm run config:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          VITE_DOORSTEP_API_URL: https://doorstep-mobile.onrender.com

  backend:
    name: Backend API smoke test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run backend integration test
        run: node --test backend/test/*.test.js
